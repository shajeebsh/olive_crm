{% extends "base.html" %}
{% block title %}Inventory{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">Inventory</h1>
    </div>
    <div class="card shadow-sm border-0">
        <div class="card-body p-5 text-center">
            <i class="fas fa-boxes fa-4x text-muted mb-4"></i>
            <h3 class="fw-bold">Inventory Management</h3>
            <p class="text-muted">Track stock levels across multiple warehouses and manage products.</p>
            <button class="btn btn-secondary mt-3" disabled>
                <span class="spinner-grow spinner-grow-sm me-2" role="status"></span>
                Stocking Shelves...
            </button>
        </div>
    </div>
</div>
{% endblock %}
