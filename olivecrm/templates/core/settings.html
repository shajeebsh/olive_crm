{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="container py-4">
    <h1 class="h3 fw-bold mb-4">Settings</h1>
    <div class="row">
        <div class="col-md-4">
            <div class="list-group shadow-sm border-0">
                <a href="#" class="list-group-item list-group-item-action active border-0">General</a>
                <a href="#" class="list-group-item list-group-item-action border-0">Security</a>
                <a href="#" class="list-group-item list-group-item-action border-0">Notifications</a>
                <a href="#" class="list-group-item list-group-item-action border-0 text-danger">Organization</a>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3">General Settings</h5>
                    <div class="mb-3">
                        <label class="form-label">CRM Name</label>
                        <input type="text" class="form-control" value="OliveCRM" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Default Currency</label>
                        <select class="form-select" disabled>
                            <option>USD</option>
                            <option>EUR</option>
                        </select>
                    </div>
                    <p class="text-muted small">More settings will be available in the enterprise version.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
