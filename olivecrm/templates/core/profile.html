{% extends "base.html" %}

{% block title %}User Profile{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-5 text-center">
                    <img src="https://ui-avatars.com/api/?name={{ user.get_full_name|default:user.username|urlencode }}&background=3d5a45&color=fff&size=128" alt="" class="rounded-circle mb-4 shadow-sm">
                    <h2 class="fw-bold mb-1">{{ user.get_full_name|default:user.username }}</h2>
                    <p class="text-muted mb-4">{{ user.email }}</p>
                    <hr class="my-4 opacity-25">
                    <div class="text-start">
                        <p class="mb-2"><strong>Username:</strong> {{ user.username }}</p>
                        <p class="mb-2"><strong>Role:</strong> Administrator</p>
                        <p class="mb-2"><strong>Last Login:</strong> {{ user.last_login|date:"M d, Y H:i" }}</p>
                    </div>
                    <button class="btn btn-primary w-100 mt-4">Edit Profile</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
